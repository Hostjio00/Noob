<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Number Fetcher</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #ffffff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #1a1a1a;
      position: relative;
    }

    .container {
      position: relative;
      background: #ffffff;
      border: 1px solid #e8e8e8;
      border-radius: 24px;
      padding: 44px 40px;
      width: 100%;
      max-width: 480px;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.06);
    }

    h1 {
      text-align: center;
      margin-bottom: 32px;
      font-size: 1.5rem;
      font-weight: 700;
      color: #1a1a1a;
      letter-spacing: -0.5px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 500;
      font-size: 0.82rem;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    input, select {
      width: 100%;
      padding: 14px 16px;
      border: 1px solid #e0e0e0;
      border-radius: 12px;
      background: #fafafa;
      color: #1a1a1a;
      font-family: 'Inter', sans-serif;
      font-size: 0.95rem;
      outline: none;
      transition: all 0.25s ease;
    }

    input:hover, select:hover {
      border-color: #ccc;
    }

    input:focus, select:focus {
      border-color: #7c4dff;
      box-shadow: 0 0 0 3px rgba(124, 77, 255, 0.1);
      background: #fff;
    }

    input::placeholder { color: #bbb; }
    select option { background: #fff; color: #1a1a1a; }

    .hint {
      font-size: 0.75rem;
      color: #aaa;
      margin-top: 8px;
    }

    .fetch-btn {
      width: 100%;
      padding: 15px;
      border: none;
      border-radius: 12px;
      background: linear-gradient(135deg, #7c4dff, #6200ea);
      color: #fff;
      font-family: 'Inter', sans-serif;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.25s ease;
      margin-top: 4px;
      position: relative;
      overflow: hidden;
    }

    .fetch-btn::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, transparent, rgba(255,255,255,0.1));
      opacity: 0;
      transition: opacity 0.25s;
    }

    .fetch-btn:hover::after { opacity: 1; }
    .fetch-btn:hover { transform: translateY(-1px); box-shadow: 0 8px 24px rgba(124, 77, 255, 0.3); }
    .fetch-btn:active { transform: translateY(0); }
    .fetch-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; box-shadow: none; }

    .spinner {
      display: none;
      text-align: center;
      margin-top: 24px;
      font-size: 0.85rem;
      color: #999;
    }

    .spinner.active {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .spinner span:last-child { color: #999; }

    .spinner-dot {
      width: 6px;
      height: 6px;
      background: #7c4dff;
      border-radius: 50%;
      animation: pulse 1.2s ease-in-out infinite;
    }

    .spinner-dot:nth-child(2) { animation-delay: 0.15s; }
    .spinner-dot:nth-child(3) { animation-delay: 0.3s; }

    @keyframes pulse {
      0%, 80%, 100% { opacity: 0.3; transform: scale(0.8); }
      40% { opacity: 1; transform: scale(1.1); }
    }

    .results { margin-top: 28px; }

    .results-list {
      max-height: 400px;
      overflow-y: auto;
      padding-right: 4px;
    }

    .number-item {
      font-family: 'SF Mono', 'Fira Code', 'Courier New', monospace;
      font-size: 1rem;
      padding: 12px 16px;
      margin-bottom: 6px;
      background: #f7f5ff;
      border: 1px solid #e8e3ff;
      border-radius: 10px;
      text-align: center;
      letter-spacing: 1.5px;
      color: #333;
      transition: all 0.2s ease;
    }

    .number-item:hover {
      background: #ede8ff;
      border-color: #d4ccff;
    }

    .copy-all-btn {
      width: 100%;
      margin-top: 16px;
      padding: 13px;
      border: none;
      border-radius: 10px;
      background: linear-gradient(135deg, #00c9a7, #00b4d8);
      color: #fff;
      font-family: 'Inter', sans-serif;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.25s ease;
      letter-spacing: 0.3px;
    }

    .copy-all-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(0, 201, 167, 0.3);
    }
    .copy-all-btn:active { transform: translateY(0); }

    .error-msg {
      margin-top: 24px;
      padding: 14px 18px;
      background: #fff5f5;
      border: 1px solid #ffe0e0;
      border-radius: 10px;
      color: #e53e3e;
      font-size: 0.85rem;
    }

    .results-list::-webkit-scrollbar { width: 4px; }
    .results-list::-webkit-scrollbar-track { background: transparent; }
    .results-list::-webkit-scrollbar-thumb { background: #ddd; border-radius: 2px; }
    .results-list::-webkit-scrollbar-thumb:hover { background: #ccc; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Number Fetcher</h1>

    <div class="form-group">
      <label for="template">Template</label>
      <input
        type="text"
        id="template"
        placeholder="50767186XXX"
        maxlength="30"
        autocomplete="off"
      />
      <p class="hint">Use X as wildcard digits</p>
    </div>

    <div class="form-group">
      <label for="count">Quantity</label>
      <select id="count">
        <option value="1" selected>1</option>
        <option value="5">5</option>
        <option value="10">10</option>
        <option value="20">20</option>
        <option value="30">30</option>
        <option value="40">40</option>
        <option value="50">50</option>
      </select>
    </div>

    <button class="fetch-btn" id="fetchBtn">Fetch Numbers</button>

    <div class="spinner" id="spinner">
      <span class="spinner-dot"></span>
      <span class="spinner-dot"></span>
      <span class="spinner-dot"></span>
      <span>Fetching</span>
    </div>

    <div id="output"></div>
  </div>

  <script src="/app.js"></script>
</body>
</html>
